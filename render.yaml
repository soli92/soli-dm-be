# Root Directory consigliata: vuota (root repo).
# Se il servizio ha Root Directory = "src", usa in dashboard (o qui sotto al posto delle righe default):
#   buildCommand: cd .. && npm ci && npm run build
#   startCommand: cd .. && npm start
services:
  - type: web
    name: soli-dm-be
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      # Frontend produzione (override in dashboard se usi altro dominio)
      - key: CORS_ORIGIN
        value: https://soli-dm-fe.vercel.app
      # Consenti preview Vercel (*.vercel.app con "soli-dm" nel nome host) oltre a CORS_ORIGIN
      - key: CORS_ALLOW_VERCEL_PREVIEW
        value: "true"
